name: Package, test, and publish

on:
  push:
    branches:
      - 'main'
    paths:
      - 'emod_api/**'
      - 'pyproject.toml'

  # Allows manual run from the Actions tab
  workflow_dispatch:

permissions:
  contents: write # Allow writing to the repository (e.g., commits, pushes)

jobs:
  build_test_publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '***SKIPBUILD***')"
    strategy:
      max-parallel: 1
      matrix:
        python-version: [ '3.9' ]
    steps:
      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install snappy
        run: |
          sudo apt-get install libsnappy-dev
        shell: bash
      - name: Build and install package
        uses: ./.github/actions/build-install-package
      - name: Install test requirements
        run: |
          pip install .[tests]
      - name: Run unit tests
        run: |
          python -m unittest discover .
        working-directory: ./tests
      - name: Push version bump
        if: success()
        run: |
          git push
      - name: Twine upload to IDM Artifactory staging
        if: success()
        run: |
          twine upload --verbose --repository-url https://packages.idmod.org/api/pypi/idm-pypi-staging/ --username ${{ secrets.STAGING_ARTIFACTORY_USERNAME }} --password ${{ secrets.STAGING_ARTIFACTORY_PASSWORD }} dist/*
